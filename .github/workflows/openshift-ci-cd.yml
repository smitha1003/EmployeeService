name: EmployeeService CI/CD to OpenShift

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    env:
      OPENSHIFT_SERVER: ${{ secrets.OPENSHIFT_SERVER }}
      OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
      OPENSHIFT_NAMESPACE: ${{ secrets.OPENSHIFT_NAMESPACE }}
      OPENSHIFT_REGISTRY: ${{ secrets.OPENSHIFT_REGISTRY }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Debug Maven environment
        shell: powershell
        run: |
          Write-Host "JAVA_HOME=$env:JAVA_HOME"
          Write-Host "USERPROFILE=$env:USERPROFILE"
          mvn -version

      - name: Build with Maven
        shell: powershell
        run: |
          mvn clean package -DskipTests -s "C:/SmithasIntelliJWS/EmployeeService/settings-openshift.xml"

      - name: Install OpenShift CLI (Windows)
        shell: powershell
        run: |
          $ocUrl = "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest/openshift-client-windows.zip"
          Invoke-WebRequest -Uri $ocUrl -OutFile oc.zip
          Expand-Archive oc.zip -DestinationPath oc
          $env:PATH += ";$PWD\oc"
          oc version

      - name: Login to OpenShift
        shell: powershell
        run: |
          Write-Host "OpenShift server is: $env:OPENSHIFT_SERVER"
          oc login $env:OPENSHIFT_SERVER `
            --token=$env:OPENSHIFT_TOKEN `
            --insecure-skip-tls-verify=true

      - name: Login to OpenShift Registry
        shell: powershell
        run: |
          $env:OPENSHIFT_TOKEN | docker login `
            $env:OPENSHIFT_REGISTRY `
            -u github-actions `
            --password-stdin

      - name: Build Docker Image
        shell: powershell
        run: |
          docker build -t employee-service:latest .

      - name: Push Image
        shell: powershell
        run: |
          docker tag employee-service:latest `
            $env:OPENSHIFT_REGISTRY/$env:OPENSHIFT_NAMESPACE/employee-service:latest
          docker push `
            $env:OPENSHIFT_REGISTRY/$env:OPENSHIFT_NAMESPACE/employee-service:latest

      - name: Deploy to OpenShift
        shell: powershell
        run: |
          oc apply -f k8s/deployment.yaml
          oc rollout restart deployment employee-service
