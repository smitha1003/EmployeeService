apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: employee-service
  template:
    metadata:
      labels:
        app: employee-service
    spec:
      containers:
      - name: employee-service
        image: image-registry.openshift-image-registry.svc:5000/employee-ci/employee-service:latest
        ports:
        - containerPort: 8081
``